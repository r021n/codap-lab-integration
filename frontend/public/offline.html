<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>Offline | AirDataLabs</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(160deg, #f8fafc 0%, #e2e8f0 100%);
        color: #0f172a;
      }

      .card {
        width: min(520px, 100%);
        background: #ffffff;
        border: 1px solid #cbd5e1;
        border-radius: 14px;
        padding: 28px;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.5rem;
        line-height: 1.25;
      }

      p {
        margin: 0 0 14px;
        line-height: 1.6;
      }

      button {
        margin-top: 8px;
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 0.95rem;
        font-weight: 600;
        color: #ffffff;
        background: #0f172a;
        cursor: pointer;
      }

      button:hover {
        background: #1e293b;
      }
    </style>
  </head>
  <body>
    <main class="card" role="main" aria-labelledby="offline-title">
      <h1 id="offline-title">Koneksi Internet Tidak Tersedia</h1>
      <p>
        Anda sedang offline. Halaman ini ditampilkan sebagai fallback PWA ketika
        konten belum tersedia di cache lokal.
      </p>
      <p>Silakan cek jaringan Anda lalu coba lagi.</p>
      <button type="button" onclick="window.location.reload()">
        Coba Lagi
      </button>
    </main>
  </body>
</html>
